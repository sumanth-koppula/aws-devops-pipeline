replicaCount: 2

image:
  repository: ""            # Set by Jenkins: ECR_REGISTRY/p9-devops-nodejs-app
  tag:        "latest"
  pullPolicy: Always

nameOverride:     ""
fullnameOverride: ""

serviceAccount:
  create:     true
  name:       ""
  annotations:
    eks.amazonaws.com/role-arn: ""   # Set by Terraform IRSA output

service:
  type: ClusterIP
  port: 80
  targetPort: 3000
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: app.example.com
      paths:
        - path:     /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu:    500m
    memory: 512Mi
  requests:
    cpu:    250m
    memory: 256Mi

hpa:
  enabled:     true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage:    70
  targetMemoryUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /health/live
    port: 3000
  initialDelaySeconds: 15
  periodSeconds:       20
  failureThreshold:    3

readinessProbe:
  httpGet:
    path: /health/ready
    port: 3000
  initialDelaySeconds: 10
  periodSeconds:       10
  failureThreshold:    3

env:
  NODE_ENV:    production
  LOG_LEVEL:   info
  APP_VERSION: "1.0.0"

configMap:
  enabled: true
  data:
    AWS_REGION: us-east-1

serviceMonitor:
  enabled:  true
  interval: 30s
  path:     /metrics

nodeSelector: {}
tolerations: []
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key:      app.kubernetes.io/name
                operator: In
                values:   [nodejs-app]
          topologyKey: kubernetes.io/hostname
