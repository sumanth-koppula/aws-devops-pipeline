apiVersion: apps/v1
kind: Deployment
metadata:
  name:      {{ include "nodejs-app.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:    {{ include "nodejs-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{ include "nodejs-app.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:       1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{ include "nodejs-app.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "3000"
        prometheus.io/path:   "/metrics"
        checksum/config:      {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "nodejs-app.fullname" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser:    1001
        fsGroup:      1001
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name:          http
              containerPort: 3000
              protocol:      TCP
          envFrom:
            - configMapRef:
                name: {{ include "nodejs-app.fullname" . }}-config
          env:
            {{- range $key, $value := .Values.env }}
            - name:  {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          livenessProbe:  {{ toYaml .Values.livenessProbe  | nindent 12 }}
          readinessProbe: {{ toYaml .Values.readinessProbe | nindent 12 }}
          resources:      {{ toYaml .Values.resources      | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
            capabilities:
              drop: [ALL]
      nodeSelector:  {{ toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:   {{ toYaml .Values.tolerations  | nindent 8 }}
      affinity:      {{ toYaml .Values.affinity      | nindent 8 }}