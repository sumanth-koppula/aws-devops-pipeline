# Production overrides — applied by Jenkins with --values flag
replicaCount: 3

hpa:
  enabled:     true
  minReplicas: 3
  maxReplicas: 20

resources:
  limits:
    cpu:    1000m
    memory: 1Gi
  requests:
    cpu:    500m
    memory: 512Mi

serviceMonitor:
  enabled:  true
  interval: 15s