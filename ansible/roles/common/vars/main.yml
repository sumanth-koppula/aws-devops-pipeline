---
# ansible/roles/common/vars/main.yml
#
# Variables used exclusively by the common role.
# Changing these affects ALL hosts that run the common role.

# ── System packages to install on every managed host ─────────────────
common_packages:
  - git
  - curl
  - wget
  - unzip
  - tar
  - jq
  - htop
  - nc
  - net-tools
  - lsof
  - python3
  - python3-pip
  - bind-utils    # nslookup, dig

# ── Python packages needed by Ansible modules ─────────────────────────
common_python_packages:
  - boto3        # Required by amazon.aws Ansible collection (dynamic inventory)
  - botocore     # boto3 dependency
  - docker       # Required by community.docker Ansible collection

# ── Kernel / OS tuning for containerized workloads ────────────────────
# These are applied via the ansible.posix.sysctl module.
# vm.max_map_count  : Required by Elasticsearch if ever deployed
# net.core.somaxconn: Increases the listen backlog for high-traffic servers
# fs.file-max       : Maximum number of open file descriptors
common_sysctl_settings:
  - key:   vm.max_map_count
    value: "262144"
  - key:   net.core.somaxconn
    value: "65535"
  - key:   fs.file-max
    value: "1000000"

# ── AWS CLI version to install ────────────────────────────────────────
aws_cli_install_dir: /usr/local/aws-cli
aws_cli_bin_dir:     /usr/local/bin

# ── Timezone setting ──────────────────────────────────────────────────
system_timezone: UTC