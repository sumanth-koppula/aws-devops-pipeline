---
- name: Create app deployment directory
  ansible.builtin.file:
    path:  "{{ deploy_dir }}"
    state: directory
    owner: appuser
    group: docker
    mode:  "0755"
  tags: [app]

- name: Authenticate to ECR
  ansible.builtin.shell: |
    aws ecr get-login-password --region {{ aws_region }} | \
    docker login --username AWS --password-stdin {{ ecr_registry }}
  changed_when: false
  tags: [app]

- name: Pull latest Docker image
  community.docker.docker_image:
    name:   "{{ ecr_registry }}/p9-devops-nodejs-app"
    tag:    "{{ app_image_tag }}"
    source: pull
    force_source: true
  tags: [app]

- name: Render app config from Jinja2 template
  ansible.builtin.template:
    src:   app.conf.j2
    dest:  "{{ deploy_dir }}/app.conf"
    owner: appuser
    mode:  "0640"
  tags: [app]

- name: Render docker-compose.yml from Jinja2 template
  ansible.builtin.template:
    src:   docker-compose.yml.j2
    dest:  "{{ deploy_dir }}/docker-compose.yml"
    owner: appuser
    mode:  "0640"
  notify: restart app
  tags: [app]

- name: Ensure app is running
  ansible.builtin.shell: |
    cd {{ deploy_dir }}
    docker compose up -d --remove-orphans
  become_user: appuser
  tags: [app]

- name: Wait for app health check
  ansible.builtin.uri:
    url:            "http://localhost:{{ host_port }}/health"
    return_content: false
    status_code:    200
  register:         health_check
  until:            health_check.status == 200
  retries:          10
  delay:            5
  tags: [app]

- name: Print deployed image
  ansible.builtin.debug:
    msg: "Deployed {{ ecr_registry }}/p9-devops-nodejs-app:{{ app_image_tag }} on {{ inventory_hostname }}"
  tags: [app]