# ansible/inventory/hosts.ini
#
# STATIC FALLBACK INVENTORY
# Use only when aws_ec2.yml dynamic inventory is unavailable.
#
# Usage: ansible-playbook playbooks/site.yml -i inventory/hosts.ini
#
# In production, use aws_ec2.yml instead:
#   ansible-playbook playbooks/site.yml -i inventory/aws_ec2.yml

# ── EC2 Worker Nodes ──────────────────────────────────────────────────
# Replace IPs with actual private IPs from: terraform output
[ec2_workers]
worker-01 ansible_host=10.0.3.10 ansible_user=ec2-user ansible_python_interpreter=/usr/bin/python3
worker-02 ansible_host=10.0.3.11 ansible_user=ec2-user ansible_python_interpreter=/usr/bin/python3

# ── Jenkins Server ────────────────────────────────────────────────────
# Rarely configured with Ansible — Jenkins bootstraps itself via user_data.sh
# Included here for ad-hoc tasks (e.g. rotate Jenkins credentials)
[jenkins]
jenkins-01 ansible_host=10.0.1.10 ansible_user=ec2-user ansible_python_interpreter=/usr/bin/python3

# ── Group Variables (override group_vars/ files inline) ───────────────
[ec2_workers:vars]
ansible_ssh_private_key_file=~/.ssh/p9-key.pem
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o ConnectTimeout=10'

[jenkins:vars]
ansible_ssh_private_key_file=~/.ssh/p9-key.pem
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o ConnectTimeout=10'

# ── Parent Group ──────────────────────────────────────────────────────
# "all_servers" is a convenience group that lets you run:
#   ansible-playbook site.yml -i hosts.ini --limit all_servers
[all_servers:children]
ec2_workers
jenkins

[all_servers:vars]
ansible_user=ec2-user